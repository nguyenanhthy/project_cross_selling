version: "3.8"

services:
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.3.0
    container_name: lakehouse-jupyter
    user: root
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./delta_lake:/home/jovyan/work/delta_lake
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYSPARK_SUBMIT_ARGS=--packages io.delta:delta-core_2.12:2.1.0 pyspark-shell
    mem_limit: 4g
    command: >
      sh -c "pip install delta-spark==2.1.0 && 
             start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''"

  backend:
    build: ./demo/backend
    container_name: lakehouse-backend
    ports:
      - "8000:8000"
    volumes:
      - ./delta_lake:/data/delta_lake
    environment:
      - DATA_PATH=/data/delta_lake/gold

  frontend:
    build: ./demo/frontend
    container_name: lakehouse-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend